name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Bump version and push tags
        uses: adobe-commerce/storefront-workflows/.github/actions/changeset-tag@v5
        with:
          commit-message: 'chore: bump version'
          push-tags: true
